<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sign up — Cubic Hub</title>
  <link rel="stylesheet" href="styles.css"/>
  <script defer src="firebase-auth.js"></script>
  <script defer src="script.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="brand">Cubic Hub</div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="container">
    <article class="card auth-card">
      <h1>Create account</h1>
      <form id="signup-form">
        <label class="field">
          <span>Email</span>
          <input type="email" id="signup-email" required autocomplete="email"/>
        </label>
        <label class="field">
          <span>Username</span>
          <input type="text" id="signup-username" required autocomplete="nickname" minlength="3" maxlength="20"/>
        </label>
        <label class="field">
          <span>Password</span>
          <input type="password" id="signup-password" required autocomplete="new-password" minlength="8"/>
        </label>
        <label class="checkbox">
          <input type="checkbox" id="tos-check" required/>
          <span>I agree to the <a href="terms-of-service.html" target="_blank">Terms of Service</a> and <a href="privacy-policy.html" target="_blank">Privacy Policy</a></span>
        </label>
        <button class="btn-primary" type="submit">Sign up</button>
      </form>
      <p class="muted">Already have an account? <a href="login.html">Login</a>.</p>
      <div id="signup-status" class="status"></div>
    </article>

    <article class="card">
      <h3>Security note</h3>
      <p>Passwords are securely handled by Firebase Authentication. We do not store raw passwords or IP addresses in client code.</p>
    </article>
  </main>

  <footer class="site-footer">
    <a href="terms-of-service.html">Terms of Service</a> •
    <a href="privacy-policy.html">Privacy Policy</a>
  </footer>
</body>
</html>
