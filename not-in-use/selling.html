<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Selling — Cubic Hub</title>
  <link rel="stylesheet" href="styles.css"/>
  <script defer src="firebase-auth.js"></script>
  <script defer src="firebase-selling.js"></script>
  <script defer src="script.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="brand">Cubic Hub</div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="prices.html">Prices</a>
      <a href="craft.html">Craft</a>
      <a href="chat.html">Chat</a>
      <a href="dashboard.html" class="guarded">Dashboard</a>
      <button id="sell-btn" class="btn-primary">Sell</button>
    </nav>
  </header>

  <main class="container">
    <article class="card">
      <h1>Marketplace</h1>
      <p class="muted">Post items for sale. Auto-tags show how your price compares to known ranges.</p>

      <dialog id="sell-modal" class="modal">
        <form id="sell-form" class="card" method="dialog">
          <h3>Create listing</h3>
          <label class="field">
            <span>Item name</span>
            <input type="text" id="sell-item" required minlength="2" maxlength="50"/>
          </label>
          <label class="field">
            <span>Price (coins)</span>
            <input type="number" id="sell-price" min="1" step="1" required/>
          </label>
          <label class="field">
            <span>In-game username</span>
            <input type="text" id="sell-username" required minlength="2" maxlength="20"/>
          </label>
          <div class="actions">
            <button class="btn-secondary" value="cancel">Cancel</button>
            <button class="btn-primary" id="sell-submit" value="default">Post</button>
          </div>
          <p id="sell-status" class="status"></p>
        </form>
      </dialog>

      <section id="listing-grid" class="grid"></section>
    </article>
  </main>

  <footer class="site-footer">
    <a href="terms-of-service.html">Terms of Service</a> •
    <a href="privacy-policy.html">Privacy Policy</a>
  </footer>

  <script>
    // Open sell modal
    document.addEventListener('DOMContentLoaded', () => {
      const sellBtn = document.getElementById('sell-btn');
      const sellModal = document.getElementById('sell-modal');
      if (sellBtn && sellModal) sellBtn.addEventListener('click', () => sellModal.showModal());
    });
  </script>
</body>
</html>
