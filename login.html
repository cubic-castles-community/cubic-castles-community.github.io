<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — Cubic Hub</title>
  <link rel="stylesheet" href="styles.css"/>
  <script defer src="firebase-auth.js"></script>
  <script defer src="script.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="brand">Cubic Hub</div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="signup.html">Sign up</a>
    </nav>
  </header>

  <main class="container">
    <article class="card auth-card">
      <h1>Login</h1>
      <form id="login-form">
        <label class="field">
          <span>Email or Username</span>
          <input type="text" id="login-ident" required autocomplete="username"/>
        </label>
        <label class="field">
          <span>Password</span>
          <input type="password" id="login-password" required autocomplete="current-password"/>
        </label>
        <button class="btn-primary" type="submit">Login</button>
      </form>
      <p class="muted">Don’t have an account? <a href="signup.html">Sign up</a>.</p>
      <div id="login-status" class="status"></div>
    </article>
  </main>

  <footer class="site-footer">
    <span>&copy; 2025 Cubic Hub</span>
  </footer>
</body>
</html>
